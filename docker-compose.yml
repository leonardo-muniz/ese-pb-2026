services:
  db:
    image: postgres:18.4-alpine
    container_name: exchange_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exchange_db
    ports:
      - "5432:5432"
    volumes:
      - exchange_pg_data:/var/lib/postgresql

  app:
    build: ./exchange-api
    container_name: exchange_api
    depends_on:
      - db # Isso garante que o banco suba antes da app
    environment:
      DB_URL: jdbc:postgresql://db:5432/exchange_db
    ports:
      - "8080:8080"

  frontend:
    image: node:26.5-alpine
    container_name: exchange_frontend
    working_dir: /app
    volumes:
      - ./exchange-frontend-ts:/app
    ports:
      - "5173:5173"
    # Instala as dependências caso não existam e inicia o Vite exposto para a rede do host
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  exchange_pg_data: